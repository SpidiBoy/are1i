<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volcano Gym - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 100px; }

        /* ── CLAVE: página invisible hasta que JS decida ── */
        body { visibility: hidden; }
    </style>

    <script>
        // Esto corre ANTES de renderizar el body
        if (localStorage.getItem('token')) {
            window.location.replace('/dashboard.html');
        } else {
            // No hay token, mostrar el login
            document.addEventListener('DOMContentLoaded', () => {
                document.body.style.visibility = 'visible';
            });
        }
    </script>
</head>
<body>

<div class="container login-container">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="text-center mb-4">Volcano Gym</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="btnLogin">
                    Ingresar
                </button>
            </form>
            <div id="mensajeError" class="text-danger mt-3 text-center" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username  = document.getElementById('username').value.trim();
        const password  = document.getElementById('password').value.trim();
        const errorDiv  = document.getElementById('mensajeError');
        const btnLogin  = document.getElementById('btnLogin');

        // Validación básica en cliente
        if (!username || !password) {
            errorDiv.textContent = 'Completa todos los campos';
            errorDiv.style.display = 'block';
            return;
        }

        // Deshabilitar botón mientras procesa
        btnLogin.disabled = true;
        btnLogin.textContent = 'Ingresando...';
        errorDiv.style.display = 'none';

        try {
            const response = await fetch('/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token',   data.token);
                localStorage.setItem('usuario', JSON.stringify(data.usuario));
                window.location.replace('/dashboard.html');
            } else {
                errorDiv.textContent = data.message || 'Error al iniciar sesión';
                errorDiv.style.display = 'block';
                btnLogin.disabled = false;
                btnLogin.textContent = 'Ingresar';
            }

        } catch (error) {
            errorDiv.textContent = 'No se pudo conectar al servidor';
            errorDiv.style.display = 'block';
            btnLogin.disabled = false;
            btnLogin.textContent = 'Ingresar';
        }
    });
</script>
</body>
</html>
